# Fija el JVM del daemon de Gradle a JDK 21 (mecanismo nativo "Daemon JVM criteria", Gradle 8.8+).
#
# Motivo:
#   Spotless ejecuta google-java-format DENTRO del JVM del daemon de Gradle, NO del JVM del
#   bloque `toolchain` de build.gradle (ese solo aplica a compileJava/test).
#   google-java-format 1.19.2 usa la API interna de javac (com.sun.tools.javac.util.Log).
#   En JDKs recientes cambio la firma de Log$DeferredDiagnosticHandler.getDiagnostics()
#   (ya no devuelve java.util.Queue) -> NoSuchMethodError en :spotlessJava.
#   JDK 21 mantiene la firma esperada por 1.19.2, por eso fijamos el daemon a 21.
#
# Gradle reutilizara el mismo JDK 21 que ya detecta para el `toolchain` de compilacion.
# Equivalente a generar este archivo con:  ./gradlew updateDaemonJvm --jvm-version=21
toolchainVersion=21
