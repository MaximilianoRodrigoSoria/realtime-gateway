apiVersion: v1
kind: Service
metadata:
  name: realtime-gateway-service
  namespace: realtime-gateway
  labels:
    app.kubernetes.io/name: realtime-gateway
spec:
  type: ClusterIP        # El Ingress (ingress.yaml) enruta el tráfico externo al Service
  selector:
    app: realtime-gateway
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
