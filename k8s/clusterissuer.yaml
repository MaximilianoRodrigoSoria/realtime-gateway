# ──────────────────────────────────────────────────────────────────────────────
# ClusterIssuer — Let's Encrypt (cert-manager)
#
# Requisito previo: cert-manager instalado en el cluster.
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
#
# Uso:
#   1. Usar 'letsencrypt-staging' primero para validar sin quemar el rate-limit.
#   2. Una vez validado, cambiar la anotación del Ingress a 'letsencrypt-prod'.
# ──────────────────────────────────────────────────────────────────────────────

# ── Staging: sin rate-limit, certificado NO confiado por los browsers ─────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    # Reemplazar con el email real del administrador del dominio
    email: admin@tudominio.com
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx

---

# ── Producción: certificado confiado por todos los browsers ──────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    # Reemplazar con el email real del administrador del dominio
    email: admin@tudominio.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
