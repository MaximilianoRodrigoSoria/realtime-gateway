# Perfil PROD — configuración endurecida para producción.
# Todos los valores sensibles llegan por variables de entorno.
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 20      # mayor concurrencia en prod
      minimum-idle: 5
      leak-detection-threshold: 30000
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 500
  jpa:
    show-sql: false

# Configuración del servidor en prod
server:
  # Confiar en X-Forwarded-Proto enviado por el Ingress nginx.
  # Sin esto: Spring Boot ignora el header, los redirects generan URLs http://
  # y Spring Security no activa HSTS (cree que la conexión es HTTP plano).
  # "framework" delega el procesamiento al DispatcherServlet (recomendado con Spring MVC).
  forward-headers-strategy: framework

# Logging estructurado en JSON (ECS) para ingesta en ELK/Loki
logging:
  structured:
    format:
      console: ecs
  level:
    root: INFO
    com.ar.laboratory.realtimegateway: INFO

# Actuator restringido en producción
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: false

# Seguridad ON y CORS cerrado en prod (sin secretos en el repo)
app:
  cache:
    enabled: true
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  security:
    enabled: true
    jwt:
      # Sin default: si falta la variable, el arranque falla (fail-fast)
      secret: ${APP_SECURITY_JWT_SECRET}
      expiration-ms: ${APP_SECURITY_JWT_EXPIRATION_MS:86400000}
