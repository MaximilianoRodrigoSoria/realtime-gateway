version: '3.8'

services:

  # ── Infraestructura ────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: realtimegateway-postgres
    environment:
      POSTGRES_DB: realtimegateway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - realtimegateway-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: realtimegateway-redis
    ports:
      - "6379:6379"
    networks:
      - realtimegateway-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Aplicación ─────────────────────────────────────────────────────────────

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: realtimegateway-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/realtimegateway
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # MaxRAMPercentage adapta el heap al límite del contenedor — no mezclar con -Xmx fijo
      JAVA_OPTS: >-
        -XX:MaxRAMPercentage=75.0
        -XX:+UseContainerSupport
        -XX:+UseG1GC
        -XX:+ExitOnOutOfMemoryError
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - realtimegateway-network
    restart: unless-stopped

  # ── Observabilidad ─────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: realtimegateway-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    networks:
      - realtimegateway-network
    depends_on:
      - app
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: realtimegateway-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Deshabilitar telemetría de Grafana
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - realtimegateway-network
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  realtimegateway-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
